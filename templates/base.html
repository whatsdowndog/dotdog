<!DOCTYPE html>
<html lang="en">
  <head>
    {%- include "partials/head.html" -%}
  </head>
  <body>
    <header>
      {%- include "partials/header.html" -%}
    </header>
    <main>
      {%- block content -%}{%- endblock -%}
    </main>
    <footer>
      {%- include "partials/footer.html" -%}
    </footer>
    <script>
      function toggleTheme() {
        var d = document.documentElement;
        var next = d.getAttribute("data-theme") === "light" ? "dark" : "light";
        if (next === "light") { d.setAttribute("data-theme", "light"); } else { d.removeAttribute("data-theme"); }
        localStorage.setItem("theme", next);
        updateToggleLabel();
      }
      function updateToggleLabel() {
        var btn = document.querySelector(".theme-toggle");
        if (btn) btn.textContent = document.documentElement.getAttribute("data-theme") === "light" ? "[dark]" : "[light]";
      }
      updateToggleLabel();
    </script>
  </body>
</html>
